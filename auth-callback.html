<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faindz · Anmeldung läuft</title>
  <style>
    :root {
      --bg: #f8f6f1;
      --text: #1a1a1a;
      --text-muted: #767066;
      --border: #e8e2d5;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .error {
      color: #c43d3d;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Anmeldung läuft…</h1>
    <p id="message">Dieses Fenster schließt sich gleich von selbst.</p>
  </div>

  <script>
    // ─── FAINDZ OAUTH POPUP CALLBACK ──────────────────────────────────
    // This page is the OAuth redirect target. When the user finishes Google
    // login, Google redirects them HERE with auth tokens in the URL hash
    // (#access_token=...&refresh_token=...).
    //
    // We extract those tokens and postMessage them back to the main window
    // (window.opener), which set up a listener via signInWithGoogle().
    //
    // If the page was opened directly (no opener), we fall back to redirecting
    // to the main app — same behavior as classic full-page OAuth.

    (function() {
      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');
      const spinnerEl = document.getElementById('spinner');

      function showError(msg) {
        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Fehler bei der Anmeldung';
        titleEl.classList.add('error');
        messageEl.textContent = msg;
      }

      // Parse the URL hash for OAuth tokens. Supabase uses the hash-based
      // implicit flow by default for browser OAuth, so tokens come in the
      // fragment (#) not the query string (?).
      const hashParams = new URLSearchParams(location.hash.slice(1));
      const queryParams = new URLSearchParams(location.search);

      const access_token = hashParams.get('access_token');
      const refresh_token = hashParams.get('refresh_token');
      const error = hashParams.get('error') || queryParams.get('error');
      const errorDescription = hashParams.get('error_description') || queryParams.get('error_description');

      // If we have an opener, this is a popup → post tokens to parent
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({
            type: 'faindz-auth-callback',
            access_token,
            refresh_token,
            error: error ? (errorDescription || error) : null,
          }, location.origin);

          // Give the opener a moment to process, then close ourselves
          setTimeout(() => {
            try { window.close(); } catch (_) {}
            // If close() doesn't work (rare), show a manual-close message
            setTimeout(() => {
              titleEl.textContent = 'Du kannst dieses Fenster jetzt schließen';
              messageEl.textContent = 'Die Anmeldung war erfolgreich.';
              spinnerEl.style.display = 'none';
            }, 600);
          }, 200);
        } catch (e) {
          showError('Konnte nicht mit dem Hauptfenster kommunizieren. Bitte schließe dieses Fenster und melde dich erneut an.');
        }
        return;
      }

      // No opener → this was opened directly (popup was closed/lost, or user
      // bookmarked the URL somehow). Redirect to main app, where the existing
      // detectSessionInUrl logic will pick up the tokens from the hash.
      if (access_token) {
        // Keep the hash so the main app can read it
        location.replace(location.origin + '/' + location.hash);
      } else if (error) {
        showError(errorDescription || error);
      } else {
        // No tokens, no error — weird state, redirect home
        location.replace(location.origin + '/');
      }
    })();
  </script>
</body>
</html>
